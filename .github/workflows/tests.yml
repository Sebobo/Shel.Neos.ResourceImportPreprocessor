name: Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  quality:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        phpVersion:
          - '8.2'
        flowVersion:
          - '8.3'
          - '8.4'
          - '9.1'

    name: 'Quality - Flow ${{ matrix.flowVersion }}'

    steps:
      - name: Checkout package
        uses: actions/checkout@v3
        with:
          path: package

      - name: Checkout Flow base distribution
        uses: actions/checkout@v3
        with:
          repository: neos/flow-base-distribution
          ref: ${{ matrix.flowVersion }}
          path: flow-base-distribution

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.phpVersion }}
          tools: composer:v2, phpstan, phpunit

      - name: Get composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT

      - name: Cache dependencies
        uses: actions/cache@v3
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-flow-${{ matrix.flowVersion }}-${{ hashFiles('flow-base-distribution/composer.json') }}
          restore-keys: ${{ runner.os }}-composer-flow-${{ matrix.flowVersion }}-

      - name: Copy package into distribution
        run: |
          mkdir -p flow-base-distribution/Packages/Plugins
          cp -R "$GITHUB_WORKSPACE/package" flow-base-distribution/Packages/Plugins/Shel.Neos.ResourceImportPreprocessor

      - name: Install dependencies
        working-directory: flow-base-distribution
        run: |
          composer config --no-plugins allow-plugins.neos/composer-plugin true
          composer install --no-interaction --no-progress

      - name: Register package and regenerate autoloader
        working-directory: flow-base-distribution
        run: |
          composer config --no-plugins repositories.shel-resource-import path Packages/Plugins/Shel.Neos.ResourceImportPreprocessor
          composer require --no-interaction --no-progress shel/neos-resource-import-preprocessor:@dev

      - name: PHPStan analysis
        working-directory: flow-base-distribution/Packages/Plugins/Shel.Neos.ResourceImportPreprocessor
        run: phpstan analyse -c phpstan.neon --no-progress

      - name: PHPUnit tests
        working-directory: flow-base-distribution/Packages/Plugins/Shel.Neos.ResourceImportPreprocessor
        run: phpunit -c phpunit.xml
