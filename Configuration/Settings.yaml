Shel:
  Neos:
    ResourceImportPreprocessor:
      processFilenames:
        enabled: true
        processors:
          'replaceSpecialChars':
            class: 'Shel\Neos\ResourceImportPreprocessor\Processor\ReplaceSpecialCharsFilenameProcessor'
            options:
              # By default, we only keep: a-zA-Z0-9, dot (.), dash (-), and underscore (_)
              pattern: '/[^a-zA-Z0-9._-]/'
              replacement: '-'
      processResources:
        enabled: true
        processors:
          'resizeImages':
            class: 'Shel\Neos\ResourceImportPreprocessor\Processor\ResizeImageResourceProcessor'
            options:
              # Scales all uploaded images to these dimensions (in px) but keeps the aspect ratio
              maxWidth: 1920
              maxHeight: 1920
              # Options passed to Imagine's save() method (e.g. JPEG quality, PNG compression)
              saveOptions:
                quality: 90
              # MIME types this processor will handle. Images with other types are returned unchanged.
              allowedMimeTypes:
                - 'image/jpeg'
                - 'image/png'
                - 'image/gif'
                - 'image/webp'
                - 'image/avif'
                - 'image/bmp'
